# ¿Qué? Configuración de Nginx para servir una Single Page Application (SPA) de React.
# ¿Para qué? Manejar correctamente el enrutamiento client-side de React Router
#            y servir los archivos estáticos generados por `pnpm build`.
# ¿Impacto? Sin esta configuración personalizada, Nginx usaría su comportamiento por
#           defecto: buscar archivos en disco para cada ruta. Resultado: al visitar
#           /login directamente o al refrescar /dashboard, Nginx devolvería 404
#           porque no existe el archivo /login o /dashboard en el sistema de archivos.
#           React Router necesita que SIEMPRE se sirva index.html, sin excepciones.

server {
    # ¿Qué? Puerto estándar HTTP en el que Nginx escucha conexiones entrantes.
    # ¿Para qué? HTTP estándar — el puerto 80 no requiere https ni certificados.
    # ¿Impacto? Debe coincidir con el EXPOSE 80 del Dockerfile y el mapeo
    #           `ports: "80:80"` del docker-compose.yml.
    listen 80;
    server_name localhost;

    # ¿Qué? Directorio raíz donde Nginx busca los archivos estáticos.
    # ¿Para qué? Apuntar a la carpeta donde el Dockerfile copió el build de React.
    # ¿Impacto? Debe coincidir exactamente con el destino del COPY --from=builder
    #           en el Dockerfile: COPY --from=builder /app/dist /usr/share/nginx/html
    root /usr/share/nginx/html;

    # ¿Qué? Archivo que se sirve al acceder a un directorio (sin ruta específica).
    # ¿Para qué? Servir index.html como punto de entrada de la SPA cuando se accede a /.
    # ¿Impacto? Sin esto, acceder a "/" retornaría un listado de archivos (403).
    index index.html;

    # ────────────────────────────
    # Enrutamiento SPA — LA regla más importante
    # ────────────────────────────

    # ¿Qué? Regla de ubicación que captura TODAS las rutas de la aplicación.
    # ¿Para qué? Delegar el enrutamiento a React Router en el cliente.
    location / {
        # ¿Qué? Intenta servir el archivo exacto solicitado; si no existe, sirve index.html.
        # ¿Para qué? Permitir que React Router maneje las rutas en el navegador.
        # ¿Impacto? Esta es LA directiva más crítica para que una SPA funcione con Nginx.
        #
        #   Flujo SIN try_files:
        #     GET /login → Nginx busca /usr/share/nginx/html/login → no existe → 404 ❌
        #
        #   Flujo CON try_files:
        #     GET /login → Nginx busca /login (no existe) → busca /login/ (no existe)
        #               → sirve /index.html → React Router lee la URL → renderiza LoginPage ✅
        #     GET /assets/index-Dj3k9.js → Nginx encuentra el archivo → lo sirve directamente ✅
        #
        #   Los tres parámetros de try_files significan:
        #     $uri       → intentar servir el archivo exacto (ej: /assets/logo.svg)
        #     $uri/      → intentar servir como directorio (ej: /static/)
        #     /index.html → si nada lo anterior funciona, servir siempre index.html
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────
    # Caché de assets estáticos
    # ────────────────────────────

    # ¿Qué? Regla específica para archivos estáticos con sus extensiones más comunes.
    # ¿Para qué? Configurar cabeceras de caché agresiva para los assets del build.
    # ¿Impacto? Vite genera nombres de archivo con hash (ej: index-Dj3k9abc.js).
    #           Como el hash cambia si el contenido cambia, estos archivos son
    #           inmutables — el navegador puede cachearlos por 1 año sin problema.
    #           Resultado: cargas subsecuentes son instantáneas (sin red).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # ¿Qué? Silencia errores de logs cuando un asset no existe.
        # ¿Para qué? Evitar ruido en logs por archivos legacy o favicon.ico faltante.
        log_not_found off;
    }

    # ────────────────────────────
    # Seguridad básica
    # ────────────────────────────

    # ¿Qué? Cabecera que impide que Nginx revele su versión en respuestas de error.
    # ¿Para qué? Reducir la información disponible para un atacante (security through obscurity).
    # ¿Impacto? Sin esto, los errores muestran "nginx/1.27.3" — facilitando ataques
    #           dirigidos a vulnerabilidades conocidas de esa versión específica.
    server_tokens off;
}
